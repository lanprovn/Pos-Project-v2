version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: pos_postgres
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_db
    ports:
      - "5432:5432"
    volumes:
      - pos_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pos_pgdata:
